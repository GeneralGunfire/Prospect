name: Water Dashboard Scrapers

on:
  schedule:
    - cron: '0 6,12,18 * * *'  # 8am, 2pm, 8pm SAST
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run water scrapers
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run scrape:water

      - name: Notify on failure
        if: failure()
        run: echo "::error::Water scrapers failed. Check Supabase scraper_logs table."
