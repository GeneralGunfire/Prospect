<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prospect – Cover Slide</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 297mm;
      height: 210mm;
      font-family: 'Inter', sans-serif;
      background: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .page {
      width: 297mm;
      height: 210mm;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      position: relative;
      padding: 32mm 40mm;
    }

    /* Accent bar top */
    .page::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 8px;
      background: #1E3A5F;
    }

    /* Accent bar bottom */
    .page::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: #1E3A5F;
      opacity: 0.2;
    }

    .logo-lockup {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 36px;
    }

    .logo-icon {
      width: 72px;
      height: 72px;
      flex-shrink: 0;
    }

    .wordmark {
      font-size: 52px;
      font-weight: 800;
      color: #1E3A5F;
      letter-spacing: -1.5px;
      line-height: 1;
    }

    .divider {
      width: 64px;
      height: 3px;
      background: #1E3A5F;
      border-radius: 2px;
      margin-bottom: 32px;
      opacity: 0.25;
    }

    .motto {
      font-size: 22px;
      font-weight: 600;
      color: #1E3A5F;
      text-align: center;
      letter-spacing: -0.3px;
      margin-bottom: 20px;
    }

    .purpose {
      font-size: 14px;
      font-weight: 400;
      color: #64748b;
      text-align: center;
      max-width: 480px;
      line-height: 1.7;
    }

    .tag {
      margin-top: 40px;
      font-size: 11px;
      font-weight: 500;
      color: #94a3b8;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="page">

    <div class="logo-lockup">
      <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
        <rect width="200" height="200" rx="40" fill="#1E3A5F"/>
        <text x="100" y="145" font-family="Inter, sans-serif" font-size="140" font-weight="700" fill="#ffffff" text-anchor="middle">P</text>
      </svg>
      <div class="wordmark">Prospect</div>
    </div>

    <div class="divider"></div>

    <div class="motto">Your future, one platform.</div>

    <div class="purpose">
      A free, mobile-first platform helping South African Grade 8–12 learners
      explore careers, find bursaries, study smarter, and understand the world
      they are growing up in — all in one place, at no cost.
    </div>

    <div class="tag">Science Expo 2026</div>

  </div>
</body>
</html>
