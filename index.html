<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0f172a" />
    <title>Prospect — Know your path. Own your future.</title>
    <meta name="description" content="South Africa's premier career guidance platform. Take our RIASEC quiz, explore 400+ SA careers with salary data, find bursaries, and access free matric study resources." />
    <meta name="keywords" content="career guidance South Africa, RIASEC quiz, bursaries South Africa, matric study resources, career paths SA, university requirements APS" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://prospect.co.za/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://prospect.co.za/" />
    <meta property="og:title" content="Prospect — Know your path. Own your future." />
    <meta property="og:description" content="South Africa's premier career guidance platform. Discover your ideal career, find bursaries, and access free matric study resources." />
    <meta property="og:image" content="https://prospect.co.za/images/og-image.jpg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Prospect — Know your path. Own your future." />
    <meta name="twitter:description" content="South Africa's premier career guidance platform. Discover your ideal career, find bursaries, and access free matric study resources." />

    <link rel="icon" type="image/svg+xml" href="/logo-icon.svg" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Prospect",
      "url": "https://prospect.co.za/",
      "description": "South Africa's premier career guidance platform for students.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://prospect.co.za/?page=careers&q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
